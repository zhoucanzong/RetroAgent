# RetroAgent Default Configuration
# This file is version-controlled. For local overrides (API keys, model selection),
# create config.local.yaml in the same directory — it's gitignored.

# ---------------------------------------------------------------------------
# Model file paths (relative to models_dir)
# ---------------------------------------------------------------------------
models:
  # ONNX expansion policy network (fingerprint → template probability)
  expansion_model: "uspto_model.onnx"
  # ONNX filter network (reaction feasibility)
  filter_model: "uspto_filter_model.onnx"
  # ONNX ring-breaker policy network (optional)
  ringbreaker_model: "uspto_ringbreaker_model.onnx"
  # USPTO template library (SMARTS retro templates)
  templates: "full_uspto_truncated_42554.hdf5"
  # Fallback template file (full, non-truncated)
  templates_fallback: "full_uspto_03_05_19_unique_templates.hdf5"
  # ZINC stock database (InChI Keys)
  stock: "zinc_stock_17_04_20.hdf5"

# ---------------------------------------------------------------------------
# LLM settings
# ---------------------------------------------------------------------------
llm:
  model: "deepseek-v4-flash"
  base_url: "https://api.deepseek.com"
  # api_key: set in config.local.yaml or LLM_API_KEY env var
  temperature: 0.3
  max_tokens: 32000
  max_retries: 3

# ---------------------------------------------------------------------------
# Agent settings
# ---------------------------------------------------------------------------
agent:
  system_template: |
    You are a **retrosynthetic planning AI**. Your goal is to find complete, feasible
    synthetic routes from commercially available starting materials to the target molecule.

    ## Available Tools

    You have access to the following specialized chemistry tools.
    Call them by specifying the tool name and parameters in your response.

    {% for tool in tools_spec %}
    ### {{ tool.name }}
    {{ tool.description }}
    **Parameters**: {{ tool.parameters | tojson }}
    {% endfor %}

    ## Current Blackboard State

    - **Target**: {{ blackboard.target }}
    - **Molecule info**: {{ blackboard.num_atoms }} atoms, {{ blackboard.rings }} rings
    - **Routes found**: {{ blackboard.route_count }}
    - **Best score**: {{ blackboard.best_score or "N/A" }}
    - **Stock hits**: {{ blackboard.stock_hits_count }}
    - **Literature**: {{ blackboard.literature_count }} precedents
    - **Disconnections analyzed**: {{ blackboard.disconnections }}
    - **Proposals generated**: {{ blackboard.proposals }}
    - **Iteration**: {{ blackboard.iteration }} / {{ max_search_depth }}
    - **Time**: {{ blackboard.elapsed }}

    ## Domain Knowledge: Retrosynthetic Analysis

    ### Core Principles
    1. **Strategic bonds**: Focus on bonds that, when broken, produce fragments with known reactivity profiles.
       - Ester, amide, ether linkages are good first targets
       - Ring-forming bonds should be analyzed carefully
    2. **Functional group compatibility**: Consider whether proposed reactions are compatible with existing functional groups
    3. **Protecting group strategy**: If a reaction would affect a sensitive group, note that protection may be needed
    4. **Convergent strategy**: Aim for routes where key fragments can be prepared independently and coupled late
    5. **Starting material availability**: Always verify precursors are commercially available (use check_stock tool)

    ### Working Strategy
    1. **FIRST** use `search_literature` to check if the target has known synthetic routes
    2. **THEN** use `disconnect` to identify strategic bond disconnection sites
    3. **FOR** the most promising bonds, use `propose` to generate specific reactions
    4. **EVALUATE** candidate routes with `evaluate`
    5. **VERIFY** precursor availability with `check_stock`
    6. If a route looks promising, continue expanding; if not, backtrack to alternative bonds

    ### Important Rules
    - Every response MUST include at least ONE tool call
    - Always explain your reasoning before making tool calls
    - If evaluation scores are consistently low, consider backtracking to alternative strategies
    - A route is complete when ALL precursors are in stock

  instance_template: |
    Plan a synthetic route for the following target molecule: **{{ task }}**

    Analyze this molecule step by step using the available tools. Start by searching
    for literature precedents, then identify strategic disconnection sites.
  step_limit: 30
  cost_limit: 10.0
  wall_time_limit_seconds: 600
  max_search_depth: 20
  search_strategy: auto

# ---------------------------------------------------------------------------
# Environment settings
# ---------------------------------------------------------------------------
environment:
  timeout: 120

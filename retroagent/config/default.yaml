# RetroAgent Default Configuration
# This file is version-controlled. For local overrides (API keys, model selection),
# create config.local.yaml in the same directory — it's gitignored.

# ---------------------------------------------------------------------------
# Model file paths (relative to models_dir)
# ---------------------------------------------------------------------------
models:
  # ONNX expansion policy network (fingerprint → template probability)
  expansion_model: "uspto_model.onnx"
  # ONNX filter network (reaction feasibility)
  filter_model: "uspto_filter_model.onnx"
  # ONNX ring-breaker policy network (optional)
  ringbreaker_model: "uspto_ringbreaker_model.onnx"
  # USPTO template library (SMARTS retro templates)
  templates: "full_uspto_truncated_42554.hdf5"
  # Fallback template file (full, non-truncated)
  templates_fallback: "full_uspto_03_05_19_unique_templates.hdf5"
  # ZINC stock database (InChI Keys)
  stock: "zinc_stock_17_04_20.hdf5"
  # Ring-breaker templates (CSV format)
  ringbreaker_templates: "uspto_ringbreaker_unique_templates.csv"
  # Path to CIC-DB conditional generation examples for design_ligand tool
  # Set this to enable LLM few-shot generation; if unset, deterministic fallback is used
  cic_db_conditional_examples: null

# ---------------------------------------------------------------------------
# LLM settings
# ---------------------------------------------------------------------------
llm:
  model: "deepseek-v4-flash"
  base_url: "https://api.deepseek.com"
  # api_key: set in config.local.yaml or LLM_API_KEY env var
  temperature: 0.3
  max_tokens: 32000
  max_retries: 3

# ---------------------------------------------------------------------------
# Agent settings
# ---------------------------------------------------------------------------
agent:
  system_template: |
    You are a **chemistry AI** that can operate in two modes: retrosynthesis and ligand/catalyst design.

    ## Available Tools

    {% for tool in tools_spec %}
    ### {{ tool.name }}
    {{ tool.description }}
    **Parameters**: {{ tool.parameters | tojson }}
    {% if tool.examples %}
    **Examples**:
    {% for ex in tool.examples %}
    - Input: `{{ ex.input | tojson }}` → Output: `{{ ex.output | tojson }}`
    {% endfor %}
    {% endif %}
    {% endfor %}

    ## Current Blackboard State

    - **Mode**: {{ blackboard.mode }}
    - **Target / Task**: {{ blackboard.target }}
    {% if blackboard.mode == 'retrosynthesis' %}
    - **Molecule info**: {{ blackboard.num_atoms }} atoms, {{ blackboard.rings }} rings
    - **Routes found**: {{ blackboard.route_count }}
    - **Best score**: {{ blackboard.best_score or "N/A" }}
    - **Stock hits**: {{ blackboard.stock_hits_count }}
    - **Literature**: {{ blackboard.literature_count }} precedents
    - **Disconnections analyzed**: {{ blackboard.disconnections }}
    - **Proposals generated**: {{ blackboard.proposals }}
    {% else %}
    - **Design candidates**: {{ blackboard.design_candidates }}
    - **Design evaluations**: {{ blackboard.design_evaluations }}
    {% endif %}
    - **Iteration**: {{ blackboard.iteration }} / {{ max_search_depth }}
    - **Time**: {{ blackboard.elapsed }}

    {% if blackboard.mode == 'retrosynthesis' and blackboard.branch_count > 0 %}
    ### Branch Exploration Status
    {{ blackboard.branch_table }}
    {% endif %}

    {% if blackboard.mode == 'retrosynthesis' %}
    ## Retrosynthesis Strategy
    1. **FIRST** use `search_literature` to check if the target has known synthetic routes
    2. **THEN** use `disconnect` to identify strategic bond disconnection sites
    3. **FOR** the most promising bonds, use `propose` to generate specific reactions
    4. **EVALUATE** candidate routes with `evaluate`
    5. **VERIFY** precursor availability with `check_stock`
    6. A route is complete when ALL precursors are **either in stock OR can be made in ONE trivial step from stock reagents**
    7. If a precursor is not in stock but is a simple molecule (e.g. common ester, anhydride, acid chloride), do NOT discard the route -- instead propose a 1-step synthesis from in-stock building blocks
    8. You have ample steps available (step_limit=100). Feel free to explore alternative routes deeply and recursively expand precursors that are not immediately available
    9. ⚠️ CRITICAL — STOCK DATABASE LIMITATIONS: The ZINC database contains ~17.4M screening compounds, NOT industrial bulk reagents. Common laboratory reagents (NaBH₄, Pd catalysts, LDA, MeI, NaOH, HCl, CO gas, H₂, MeCN, solvents) are nearly always purchasable from chemical suppliers even if ZINC reports "not in stock". The stock check is a HELPFUL HINT, not a final verdict. Do NOT discard a chemically sound route just because a common reagent fails the ZINC check. Use your chemical knowledge to decide what is truly unavailable vs. what ZINC simply doesn't catalog.
    {% else %}
    ## Ligand/Catalyst Design Strategy
    1. **FIRST** use `design_ligand` to generate candidate molecules matching the constraints
    2. **THEN** use `analyze_chirality` to verify stereochemistry
    3. **THEN** use `classify_ligand` to check scaffold family and denticity
    4. **THEN** use `check_stock` to verify precursor availability
    5. **THEN** use `evaluate` to score synthetic feasibility
    6. **FOR METAL COMPLEXES**: do NOT try to write a single organometallic SMILES (RDKit cannot parse them reliably). Instead use `design_catalyst` with a STRUCTURED descriptor — separate organic ligand SMILES + metal/oxidation_state/geometry + per-ligand denticity/donor_atoms/count. The tool COMPUTES objective facts (coordination number, d-electron count, labile-site count, symmetry candidates, oxidation-state plausibility) and REPORTS them. It never judges — YOU and the Design Auditor interpret the facts.
    7. After validation, the system will run a **Design Auditor** (in an isolated context) to catch chemical errors before submission
    8. Address ALL auditor issues before submitting; CRITICAL issues must be resolved
    {% endif %}

    ### Think Tool — Your Reasoning Workspace
    Use the `think` tool BEFORE making any major decisions:
    - **Before choosing bonds to disconnect**: analyze functional group compatibility and template matching quality
    - **Before calling evaluate**: predict expected scores and note concerns about specific precursors
    - **Before deciding to submit**: audit the route for completeness (all precursors in stock? chirality addressed?)
    - **When results are surprising**: reason about why (e.g., low feasibility despite matched templates) and whether to backtrack
    - **When stuck between options**: compare alternatives explicitly

    The `think` tool does NOT count as an action step — use it freely.
    Good: think → disconnect → think about results → propose → think about precursors → evaluate
    Bad: disconnect → propose → evaluate → submit (no explicit reasoning between steps)

    ### Important Rules
    - Every response MUST include at least ONE tool call (except when you are ready to submit the final answer)
    - You may call `think` and an action tool together in the same response (multiple tool_calls)
    - When calling tools, output a single ```json code block containing either one action object or a list of action objects
    - Each action object must have exactly two keys: `tool` and `parameters`
    - Example:
      ```json
      [{"tool": "design_ligand", "parameters": {"constraints": "Point chirality ligand with P and O donor atoms", "count": 3}}]
      ```
    - When you have a final answer, include the literal string `COMPLETE_TASK_AND_SUBMIT_FINAL_OUTPUT` followed by the answer
    - Always explain your reasoning before making tool calls

  instance_template: |
    {% if mode == 'retrosynthesis' %}
    Plan a synthetic route for the following target molecule: **{{ task }}**
    Analyze this molecule step by step using the available tools.
    {% else %}
    Design a molecule or catalyst matching the following constraints: **{{ task }}**
    Generate candidates, then verify their stereochemistry, ligand classification, and feasibility.
    {% endif %}
  step_limit: 100
  cost_limit: 10.0
  wall_time_limit_seconds: 600
  max_search_depth: 20
  search_strategy: auto

  # Inner Loop Engineering
  enable_reflection: true
  enable_backtracking: true
  backtrack_score_threshold: 0.3
  backtrack_patience: 2
  enable_repeated_action_guard: true
  max_repeated_actions: 2
  enable_schema_validation: true

  # Dead-Loop Monitor (Phase 0)
  enable_dead_loop_monitor: true
  cycling_window: 6
  stagnation_rounds: 5
  semantic_repeat_threshold: 3
  enable_early_exit_hint: true
  early_exit_score_threshold: 0.7

  # Enhanced Observation (Phase 2)
  enable_enhanced_observation: true

  # Auto-tune (Phase 3)
  enable_auto_tune: true

  # Design Auditor (Phase 0F)
  enable_design_auditor: true

# ---------------------------------------------------------------------------
# Environment settings
# ---------------------------------------------------------------------------
environment:
  timeout: 120
